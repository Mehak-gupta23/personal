<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Surprise ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎁 A Little Surprise For You ❤️</h1>

    <div id="giftSection">
        <img src="images/gift.png" id="giftBox" alt="Gift Box">
        <br>
        <button onclick="openGift()">Open Your Gift</button>
    </div>

    <div id="surprise" class="hidden">

        <h2>📸 Our Memories ❤️</h2>

        <img id="photo" src="images/photo1.jpg" alt="Memory">

        <br><br>

        <button id="nextBtn" onclick="nextPhoto()">
            Next Memory ❤️
        </button>

        <br><br>

        <div id="message"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
